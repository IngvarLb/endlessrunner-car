<!-- @dsCard group="Abilities · Run-HUD" name="Ladeleiste + Activate-Zone (laden / bereit)" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ladeleiste</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;600;800;900&family=Noto+Sans+JP:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #f4ede0;
    --paint: #e23b2e;
    --gold: #c79a3e;
    --border-ondark: rgb(246 239 224 / 0.22);
    --font-display: "Anton", system-ui, sans-serif;
    --font-body: "Archivo", system-ui, sans-serif;
    --font-jp: "Noto Sans JP", system-ui, sans-serif;
    --font-mono: "Space Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    /* representative run scene — dusk road over warm sky */
    background:
      linear-gradient(180deg, #b8744f 0%, #caa15f 26%, #9aa07a 50%, #5d6b58 70%, #3c4740 100%);
    min-height: 100vh; display: flex; flex-direction: column; gap: 26px;
    justify-content: center; align-items: center; padding: 40px;
    font-family: var(--font-body); color: var(--ink);
  }
  .stage { width: 460px; max-width: 100%; }
  .stage-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; color: rgb(255 255 255 / 0.85); text-shadow: 0 1px 3px rgb(0 0 0 / 0.5); margin-bottom: 9px; text-align: center; }

  /* Charge meter — Temple-Run style, bottom of HUD, above safe area */
  .meter {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    background: rgb(20 14 22 / 0.5);
    border: 1px solid var(--border-ondark);
    backdrop-filter: blur(2px);
  }
  .meter .kanji {
    width: 38px; height: 38px; flex: none; display: grid; place-items: center;
    background: var(--paint); color: #fff;
    font-family: var(--font-jp); font-weight: 900; font-size: 22px;
  }
  .meter .body { flex: 1; min-width: 0; }
  .meter .top { display: flex; align-items: baseline; justify-content: space-between; }
  .meter .nm { font-family: var(--font-body); font-weight: 900; font-size: 12px; letter-spacing: 0.08em; }
  .meter .nm .jp { font-family: var(--font-jp); font-weight: 700; margin-right: 6px; color: rgb(244 237 224 / 0.8); }
  .meter .pct { font-family: var(--font-mono); font-size: 11px; color: rgb(244 237 224 / 0.75); }
  .meter .track { height: 10px; background: rgb(0 0 0 / 0.5); margin-top: 6px; overflow: hidden; }
  .meter .fill { height: 100%; background: linear-gradient(90deg, var(--gold), #e7c160); }

  /* ready state */
  .meter.ready { border-color: var(--paint); box-shadow: 0 0 0 2px rgb(226 59 46 / 0.5), 0 0 24px rgb(226 59 46 / 0.45); animation: pulse 1.1s ease-in-out infinite; }
  .meter.ready .fill { background: linear-gradient(90deg, var(--paint), #ff7a4d); animation: shimmer 1.1s linear infinite; background-size: 200% 100%; }
  .meter.ready .pct { color: #ffd9b0; font-weight: 700; }
  @keyframes pulse { 50% { box-shadow: 0 0 0 2px rgb(226 59 46 / 0.85), 0 0 34px rgb(226 59 46 / 0.7); } }
  @keyframes shimmer { to { background-position: 200% 0; } }

  /* Activate tap-zone (separate from boost) */
  .zones { display: flex; gap: 12px; margin-top: 14px; }
  .zone { flex: 1; text-align: center; padding: 14px 10px; border: 1px dashed var(--border-ondark); background: rgb(20 14 22 / 0.28); }
  .zone .jp { font-family: var(--font-jp); font-weight: 900; font-size: 18px; display: block; }
  .zone .en { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; color: rgb(244 237 224 / 0.66); margin-top: 4px; }
  .zone.activate { border: 1px solid var(--paint); background: rgb(226 59 46 / 0.16); }
  .zone.activate .jp { color: #ffd9b0; }
  .zone.boost .jp { color: rgb(244 237 224 / 0.85); }
</style>
</head>
<body>
  <div class="stage">
    <div class="stage-label">充填中 · LÄDT (72 %)</div>
    <div class="meter">
      <div class="kanji">赤</div>
      <div class="body">
        <div class="top"><span class="nm"><span class="jp">主</span>STRIKER BOOST</span><span class="pct">72 %</span></div>
        <div class="track"><div class="fill" style="width:72%"></div></div>
      </div>
    </div>
  </div>

  <div class="stage">
    <div class="stage-label">発動可能 · BEREIT</div>
    <div class="meter ready">
      <div class="kanji">赤</div>
      <div class="body">
        <div class="top"><span class="nm"><span class="jp">主</span>STRIKER BOOST</span><span class="pct">発動！ TAP</span></div>
        <div class="track"><div class="fill" style="width:100%"></div></div>
      </div>
    </div>
    <div class="zones">
      <div class="zone activate"><span class="jp">発動</span><span class="en">ACTIVATE</span></div>
      <div class="zone boost"><span class="jp">加速</span><span class="en">BOOST</span></div>
    </div>
  </div>
</body>
</html>
