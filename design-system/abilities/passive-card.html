<!-- @dsCard group="Abilities · Garage" name="Passive-Karte (Meter · 100 Meisterstufen)" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Passive-Karte</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;600;800;900&family=Noto+Sans+JP:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #f4ede0;
    --paint: #e23b2e;
    --gold: #c79a3e;
    --border-ondark: rgb(246 239 224 / 0.22);
    --font-display: "Anton", system-ui, sans-serif;
    --font-body: "Archivo", system-ui, sans-serif;
    --font-jp: "Noto Sans JP", system-ui, sans-serif;
    --font-mono: "Space Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: radial-gradient(120% 90% at 30% 20%, #38302a 0%, #241f1b 55%, #19150f 100%);
    min-height: 100vh; display: grid; place-items: center; padding: 40px;
    font-family: var(--font-body); color: var(--ink);
  }

  .card {
    width: 430px; max-width: 100%;
    background: rgb(20 14 22 / 0.34);
    border: 1px solid var(--border-ondark);
    border-left: 3px solid rgb(246 239 224 / 0.4);
    padding: 16px 18px 18px;
    text-shadow: 0 1px 5px rgb(0 0 0 / 0.6);
  }

  .head { display: flex; align-items: center; gap: 11px; }
  .kanji {
    width: 38px; height: 38px; display: grid; place-items: center;
    border: 1px solid var(--border-ondark);
    font-family: var(--font-jp); font-weight: 900; font-size: 22px; color: var(--ink);
  }
  .head-labels { flex: 1; min-width: 0; }
  .role { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.26em; color: rgb(244 237 224 / 0.55); }
  .role b { color: var(--ink); font-weight: 700; }
  .tier-badge {
    display: inline-flex; align-items: center; gap: 5px; padding: 4px 8px;
    border: 1px solid var(--border-ondark);
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; color: rgb(244 237 224 / 0.72);
  }
  .tier-badge .jp { font-family: var(--font-jp); font-weight: 700; font-size: 12px; }

  .name { font-family: var(--font-display); font-weight: 400; font-size: 30px; line-height: 0.95; text-transform: uppercase; margin: 13px 0 0; }
  .now { display: flex; align-items: baseline; gap: 8px; margin-top: 9px; font-family: var(--font-mono); font-size: 12px; color: rgb(244 237 224 / 0.66); }
  .now .val { color: var(--ink); font-weight: 700; font-size: 14px; }

  .mastery-head { display: flex; align-items: baseline; justify-content: space-between; margin-top: 14px; }
  .mastery-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.16em; color: rgb(244 237 224 / 0.5); }
  .mastery-val { font-family: var(--font-body); font-weight: 900; font-size: 13px; }
  .mastery-val .star { color: var(--gold); }

  .track { height: 8px; background: rgb(0 0 0 / 0.42); margin-top: 8px; position: relative; overflow: hidden; }
  .fill { height: 100%; width: 46%; background: linear-gradient(90deg, var(--paint), #f06b5e); }
  .hint { display: flex; align-items: center; justify-content: space-between; margin-top: 7px; }
  .hint .auto { font-family: var(--font-jp); font-size: 10px; color: rgb(244 237 224 / 0.42); }
  .hint .togo { font-family: var(--font-mono); font-size: 11px; color: rgb(244 237 224 / 0.7); }
  .hint .togo b { color: var(--ink); }
</style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="kanji">赤</div>
      <div class="head-labels">
        <div class="role">匠 · <b>PASSIVE</b></div>
      </div>
      <div class="tier-badge"><span class="jp">里</span>MASTERY</div>
    </div>

    <h2 class="name">Knautschzone</h2>

    <div class="now"><span>現在</span><span class="val">+1 Extra-Fail</span><span>· Nachladen alle 540 m</span></div>

    <div class="mastery-head">
      <span class="mastery-label">MEISTERSTUFE</span>
      <span class="mastery-val">12 <span class="star">/ 100</span></span>
    </div>
    <div class="track"><div class="fill"></div></div>
    <div class="hint">
      <span class="auto">自動 · durch gefahrene Meter</span>
      <span class="togo">noch <b>8.240 m</b> → Stufe 13</span>
    </div>
  </div>
</body>
</html>
